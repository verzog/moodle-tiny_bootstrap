name: Moodle Plugin CI

on:
  push:
    branches:
      - main
      - 'MOODLE_*'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      TZ: Australia/Sydney

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
        moodle-branch: ['MOODLE_404_STABLE', 'MOODLE_405_STABLE']
        database: [pgsql, mysqli]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist \
            moodlehq/moodle-plugin-ci ci ^4
          echo "$(cd ci && pwd)/bin" >> $GITHUB_PATH
          echo "$(cd ci && pwd)/vendor/bin" >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8

      - name: Install Moodle
        run: moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1
        env:
          DB:             ${{ matrix.database }}
          MOODLE_BRANCH:  ${{ matrix.moodle-branch }}

      - name: PHP Lint
        if: always()
        run: moodle-plugin-ci phplint

      - name: PHP Code Checker
        if: always()
        run: moodle-plugin-ci codechecker

      - name: PHP Copy/Paste Detector
        if: always()
        run: moodle-plugin-ci phpcpd

      - name: Moodle PHPDoc checker
        if: always()
        run: moodle-plugin-ci phpdoc

      - name: Validate plugin structure
        if: always()
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        if: always()
        run: moodle-plugin-ci savepoints

      - name: Mustache lint
        if: always()
        run: moodle-plugin-ci mustache

      - name: Grunt (JS/CSS lint)
        if: always()
        run: moodle-plugin-ci grunt --component tiny_bootstrap

      - name: PHPUnit tests
        if: always()
        run: moodle-plugin-ci phpunit --fail-on-warning
